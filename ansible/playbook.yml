- name: Infastructure Service Setup
  hosts: local
  become: yes    #Give sudo priviledge
  collections:
    - community.docker
  vars:
    prometheus_version: 3.9.1

  tasks:
    - name: update package manager        # Always Update package manager
      apt:
        update_cache: yes

    - name: Install necessary packages
      apt:
       name: "{{ item }}"
       state: present            # Present Version Change to "latest" for latest version
      loop:
         - apt-transport-https
         - ca-certificates
         - curl
         - software-properties-common

# -------------------Docker Installation-------------

    - name: Install Docker
      apt:
        name:
         - docker.io
         - docker-compose-plugin
        state: present
        update_cache: yes

# -----------------------Install grafana------------------

    - name: Install grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Ensure grafana service running
      service:
         name: grafana-server
         state: started
         enabled: yes

# ----------------------Install Prometheus------------------
#
#    - name: Downlaod prometheus tarball
#      get_url:
#        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
#        dest: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
#
#    - name: Extract prometheus tarball
